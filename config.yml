models:
  lightgbm:
    enabled: true
    optuna:
      learning_rate: [0.005, 0.3]
      max_depth: [6, 15]
      num_leaves: [100, 400]
      subsample: [0.6, 1.0]
      colsample_bytree: [0.6, 1.0]
      reg_alpha: [0.0, 10.0]
      reg_lambda: [0.0, 10.0]

  catboost:
    enabled: true
    optuna:
      learning_rate: [0.005, 0.3]
      depth: [4, 10]
      l2_leaf_reg: [0.0, 10.0]

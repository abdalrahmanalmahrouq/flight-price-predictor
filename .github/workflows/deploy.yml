name: Deploy to AWS

on:
  push:
    branches: [main]

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: Run tests
        run: pytest tests/ -v

  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            eu-north-1

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push API image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker build \
            -t $ECR_REGISTRY/flight-price-predictor-api:${{ github.sha }} \
            -t $ECR_REGISTRY/flight-price-predictor-api:latest \
            -f Dockerfile .
          docker push $ECR_REGISTRY/flight-price-predictor-api:${{ github.sha }}
          docker push $ECR_REGISTRY/flight-price-predictor-api:latest

      - name: Build and push MLflow image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker build \
            -t $ECR_REGISTRY/flight-price-predictor-mlflow:${{ github.sha }} \
            -t $ECR_REGISTRY/flight-price-predictor-mlflow:latest \
            -f Dockerfile.mlflow .
          docker push $ECR_REGISTRY/flight-price-predictor-mlflow:${{ github.sha }}
          docker push $ECR_REGISTRY/flight-price-predictor-mlflow:latest

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.EC2_HOST }}
          username: ubuntu
          key:      ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Login to ECR from EC2
            aws ecr get-login-password --region eu-north-1 | \
              docker login --username AWS \
              --password-stdin ${{ secrets.ECR_REGISTRY }}

            docker pull ${{ secrets.ECR_REGISTRY }}/flight-price-predictor-api:latest
            docker pull ${{ secrets.ECR_REGISTRY }}/flight-price-predictor-mlflow:latest

            cd /home/ubuntu/flight-price-predictor
            git pull origin main

            docker compose down
            docker compose up -d --no-build

            sleep 40

            curl -f http://localhost:8000/health && \
              echo "Deployment successful" || \
              echo "Health check failed — check: docker compose logs api"
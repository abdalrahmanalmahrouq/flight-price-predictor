services:

  mlflow:
    image: 853506921311.dkr.ecr.eu-north-1.amazonaws.com/flight-price-predictor-mlflow:latest
    working_dir: /app
    volumes:
      - ./mlruns:/app/mlruns
      - ./mlflow.db:/app/mlflow.db
    ports:
      - "5000:5000"
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri sqlite:///mlflow.db
      --default-artifact-root mlflow-artifacts:/
      --artifacts-destination s3://flight-predictor-artifacts-2026-1/
      --serve-artifacts
      --allowed-hosts "*"
      --cors-allowed-origins "*"

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 45s
  api:
    image: 853506921311.dkr.ecr.eu-north-1.amazonaws.com/flight-price-predictor-api:latest
    ports:
      - "8000:8000"
      - "8089:8089"
    volumes:
      - ./mlruns:/app/mlruns
      - ./models:/app/models
      - ./data:/app/data
      - ./logs:/app/logs
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - MODEL_NAME=lightgbm_model
      - MODEL_ALIAS=champion
      - LOAD_FROM=mlflow
      - CHAMPION_MODEL_PATH=models/lightgbm_model.joblib
      - LOG_LEVEL=INFO
    depends_on:
      mlflow:
        condition: service_healthy 


  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
    depends_on:
      - api

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    depends_on:
      - prometheus
  
volumes:
  prometheus_data:    # persists metrics across restarts
  grafana_data:       # persists dashboards across restarts